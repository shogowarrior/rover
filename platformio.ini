; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
framework = arduino
monitor_speed = 115200

[env:ARDUINO]
extends = common
platform = atmelavr
board = uno
upload_port = /dev/cu.usbmodem*
build_src_filter = +<./arduino/**.cpp> +<./arduino/**/**.cpp> +<./common/**.cpp>
lib_deps = 
	adafruit/Adafruit Motor Shield V2 Library @ ^1.1.3
	bblanchon/ArduinoJson @ ^7.0.4

[env:ESP32]
extends = common
platform = espressif32
board = esp32dev
upload_port = /dev/cu.usbserial-537E0459981
build_src_filter = +<./esp32/**.cpp>
lib_deps = 
	bblanchon/ArduinoJson @ ^7.0.4
	jvpernis/PS3 Controller Host @ ^1.1.0
	ayushsharma82/WebSerial @ ^2.0.2
  Ultrasonic
